<script>
let t=0, bt=0, lbt=0;
const w1=document.getElementById('w1'),
      w2=document.getElementById('w2'),
      w3=document.getElementById('w3'),
      boat=document.getElementById('boat'),
      lb=document.getElementById('lb');
const palms=[
  {el:document.getElementById('p1'),cx:409,cy:204,ph:0,sp:.72},
  {el:document.getElementById('p2'),cx:650,cy:204,ph:1.3,sp:.64},
  {el:document.getElementById('p3'),cx:859,cy:204,ph:2.1,sp:.80}
];
function frame(){
  t+=0.018; bt+=0.011; lbt+=0.007;
  // Waves
  const mk=(yb,a,off)=>`M0,${yb+a*Math.sin(t+off)} Q150,${yb-a*Math.sin(t+off+.6)} 300,${yb+a*Math.sin(t+off+1.2)} Q450,${yb-a*Math.sin(t+off+1.8)} 600,${yb+a*Math.sin(t+off+2.4)} Q750,${yb-a*Math.sin(t+off+3)} 900,${yb+a*Math.sin(t+off+3.6)} L900,370 L0,370Z`;
  w1.setAttribute('d',mk(216,7,0));
  w2.setAttribute('d',mk(229,5,.9));
  w3.setAttribute('d',mk(242,4,1.8));
  // Boat bob
  boat.setAttribute('transform',`translate(0,${2.8*Math.sin(bt)})`);
  // Lighthouse beam
  const ang=38*Math.sin(lbt);
  lb.setAttribute('transform',`rotate(${ang},696,88)`);
  lb.setAttribute('opacity',(0.55+0.25*Math.cos(lbt*2)).toFixed(3));
  // Palm sway
  palms.forEach(p=>{
    const a=3.2*Math.sin(p.sp*t+p.ph);
    p.el.setAttribute('transform',`rotate(${a},${p.cx},${p.cy})`);
  });
  requestAnimationFrame(frame);
}
frame();
</script>
